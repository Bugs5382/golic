  rules:
    .go:
      prefix: "\n/*"
      suffix: "*/"
      under:
        - "package *"
    "*.go.txt":
      prefix: "/*"
      suffix: "*/"
    .java:
      prefix: "/*"
      suffix: "*/"
    .scala:
      prefix: "/*"
      suffix: "*/"
    .cs:
      prefix: "/*"
      suffix: "*/"
    .html:
      prefix: "<!--"
      suffix: "-->"
    .js:
      prefix: "/*"
      suffix: "*/"
    .css:
      prefix: "/*"
      suffix: "*/"
    .yaml:
      prefix: "# "
    .yml:
      prefix: "# "
    Dockerfile*:
      prefix: "# "
    Makefile:
      prefix: "# "
    .gitignore:
      prefix: "# "
    .licignore:
      prefix: "# "
    .tf:
      prefix: "# "
    .tpl:
      prefix: "{{/*"
      suffix: "*/}}"
    .sh:
      prefix: "# "
      under:
        - "#!/usr/bin/*"
        - "#!/bin/*"
    .xml:
      prefix: "<!--"
      suffix: "-->"
      under:
        - "<?xml"