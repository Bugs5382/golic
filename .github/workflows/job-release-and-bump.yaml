name: Version Manager

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: read

jobs:
  Update_On_Main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Release Drafter (Anticipate Version)
        id: drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Makefile
        run: |
          NEXT_VER="${{ steps.drafter.outputs.resolved_version }}"
          echo "Anticipated next version: $NEXT_VER"
          sed -i "s/^VERSION[[:space:]]*?=.*/VERSION ?= $NEXT_VER/" Makefile

      - name: Update Changelog File
        uses: stefanzweifel/changelog-updater-action@v1.9.1
        with:
          latest-version: ${{ steps.drafter.outputs.tag_name }}
          release-notes: ${{ steps.drafter.outputs.body }}

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if the version actually changed to avoid infinite loops
          if git diff --exit-code Makefile; then
            echo "No version change detected."
          else
            git add Makefile
            git commit -m "chore: bump version to ${{ steps.drafter.outputs.resolved_version }} [skip ci]"
            git push
          fi

  Build_and_Release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Binary
        run: |
          make build

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}