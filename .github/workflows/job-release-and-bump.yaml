name: Version Manager

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  Update_On_Main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Release Drafter (Anticipate Version)
        id: drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Makefile
        run: |
          NEXT_VER="${{ steps.drafter.outputs.resolved_version }}"
          echo "Anticipated next version: $NEXT_VER"
          sed -i "s/^VERSION[[:space:]]*?=.*/VERSION ?= v$NEXT_VER/" Makefile

      - name: Update Changelog File
        uses: stefanzweifel/changelog-updater-action@v1.9.1
        with:
          latest-version: ${{ steps.drafter.outputs.tag_name }}
          release-notes: ${{ steps.drafter.outputs.body }}
          release-date: ${{ steps.drafter.outputs.publish_date }}

      - name: Commit and Push Version Update
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(release): ${{ github.event.release.tag_name }} [skip ci]"
          file_pattern: CHANGELOG.md

  Build_and_Release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Binary
        run: |
          make build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
