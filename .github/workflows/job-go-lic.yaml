name: GoLic
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
jobs:
  GoLic:
    name: GoLic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GoLic
        run: |
          go build -o ./bin/golic ./cmd/golic
          ./bin/golic inject -c "2026 Shane" -t apache2 -d
