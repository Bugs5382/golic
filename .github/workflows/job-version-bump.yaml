name: Release Manager

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  Update_On_Main:
    name: 🚀 Prep Release
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: "Iv23ligVrrLzGPXe28dn"
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Drafter (Anticipate Version)
        id: drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect releasable changes
        id: releasable
        env:
          BODY: ${{ steps.drafter.outputs.body }}
        run: |
          # On a push, skip the prep when release-drafter found no PR entries
          # (nothing releasable) so the manifest does not drift ahead. A manual
          # workflow_dispatch always runs the full lifecycle.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || printf '%s' "$BODY" | grep -qE '\(#[0-9]+\)'; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No releasable changes since the last release; skipping the prep commit."
            echo "yes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Release Version
        if: steps.releasable.outputs.yes == 'true'
        run: |
          task update-version NEW_VERSION=v${{ steps.drafter.outputs.resolved_version }}

      - name: Run Changelog Action
        if: steps.releasable.outputs.yes == 'true'
        uses: Bugs5382/changelog-updater-action@v0.3.2
        env:
          LOG_LEVEL: debug
          LOG_FORMAT: text
          RELEASE_NOTES: >-
            ${{ steps.drafter.outputs.body }}
          RELEASE_VERSION: v${{ steps.drafter.outputs.resolved_version }}
        with:
          tag: ${{ env.RELEASE_VERSION }}
          notes: ${{ env.RELEASE_NOTES }}
          diff: 'true'

      - name: Commit and Push Version Update
        if: steps.releasable.outputs.yes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(pre-release): v${{ steps.drafter.outputs.resolved_version }} [skip ci]"
          commit_user_name: ${{ github.actor }}
          commit_user_email: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
          commit_author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>

  Build_and_Release:
    name: 📦 Build & Attach Binaries
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true

      - name: Release via GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: -p 3 release --clean --timeout 60m0s
          version: '~> v2'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_COMMIT_TAG: ${{ github.event.release.tag_name }}
